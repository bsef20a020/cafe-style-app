services:
  backend:
    build:
      context: ./backend
    container_name: noffelo-backend
    ports:
      - "8787:8787"
    environment:
      NOFFELO_ADMIN_KEY: "${NOFFELO_ADMIN_KEY}"
      NOFFELO_INGEST_TOKEN: "${NOFFELO_INGEST_TOKEN}"
      NOFFELO_CORS_ORIGINS: "${NOFFELO_CORS_ORIGINS:-http://127.0.0.1:5500,http://localhost:5500}"
      NOFFELO_RATE_LIMIT_RPM: "${NOFFELO_RATE_LIMIT_RPM:-180}"
      NOFFELO_MAX_BODY_BYTES: "${NOFFELO_MAX_BODY_BYTES:-65536}"
    volumes:
      - ./backend/data:/data
    restart: unless-stopped
